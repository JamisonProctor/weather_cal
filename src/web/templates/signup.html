<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign up — WeatherCal</title>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; max-width: 400px; margin: 60px auto; padding: 0 24px; color: #111; }
    .site-header { font-size: 1.1rem; font-weight: 700; margin-bottom: 2rem; }
    h1 { margin-bottom: 1.5rem; }
    label { display: block; margin: 16px 0 4px; font-weight: 500; font-size: 0.95rem; }
    input { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #d1d5db; border-radius: 6px; font-size: 1rem; }
    input:focus { outline: 2px solid #2563eb; border-color: transparent; }
    .hint { font-size: 0.82rem; color: #6b7280; margin-top: 3px; }
    button { margin-top: 24px; width: 100%; padding: 12px; background: #2563eb; color: #fff; border: none; border-radius: 6px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    button:hover { background: #1d4ed8; }
    .error { background: #fef2f2; border: 1px solid #fecaca; color: #dc2626; padding: 10px 14px; border-radius: 6px; margin-bottom: 16px; font-size: 0.95rem; }
    .footer { margin-top: 20px; font-size: 0.9rem; color: #333; }
    a { color: #2563eb; }
  </style>
</head>
<body>
  <div class="site-header">WeatherCal ☀️</div>
  <h1>Create your account</h1>
  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}
  <form method="post" action="/signup">
    <label for="email">Email</label>
    <input type="email" id="email" name="email" required autocomplete="username" autofocus>

    <label for="password">Password</label>
    <input type="password" id="password" name="password" required minlength="12"
      autocomplete="new-password"
      passwordrules="minlength: 12; required: lower; required: upper; required: digit;">

    <button type="submit">Create account</button>
  </form>
  <p class="footer">Already have an account? <a href="/login">Log in</a></p>
</body>
</html>
