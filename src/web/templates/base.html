<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌤️</text></svg>">
  <title>{% block title %}WeatherCal{% endblock %}</title>
  <style>
    :root {
      --bg: #FFF8E1;
      --text: #3E2723;
      --text-muted: #795548;
      --accent: #E65100;
      --accent-hover: #BF360C;
      --border: #e8d5c4;
      --bg-subtle: #fff5d6;
    }

    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      color: var(--text);
      margin: 0;
      padding: 0;
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
    }

    .layout-narrow { max-width: 520px; margin: 0 auto; padding: 24px; position: relative; z-index: 1; display: flex; flex-direction: column; min-height: 100vh; }
    .layout-medium { max-width: 720px; margin: 0 auto; padding: 24px; position: relative; z-index: 1; display: flex; flex-direction: column; min-height: 100vh; }
    .layout-wide   { max-width: 960px; margin: 0 auto; padding: 24px; position: relative; z-index: 1; display: flex; flex-direction: column; min-height: 100vh; }

    nav { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; border-bottom: 1px solid var(--border); margin-bottom: 32px; flex-wrap: wrap; gap: 8px; }
    .brand { font-size: 1.1rem; font-weight: 700; color: var(--accent); text-decoration: none; }
    .brand:hover { color: var(--accent-hover); }
    .nav-right { display: flex; align-items: center; gap: 12px; }
    .nav-link { color: var(--text-muted); text-decoration: none; font-size: 0.95rem; }
    .nav-link:hover { color: var(--text); }
    .logout-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 0.95rem; padding: 0; }
    .logout-btn:hover { color: var(--text); }
    .logout-btn:focus { outline: 2px solid var(--accent); outline-offset: 2px; }

    .btn { display: inline-flex; align-items: center; gap: 8px; padding: 14px 32px; border-radius: 8px; font-size: 1rem; font-weight: 600; text-decoration: none; cursor: pointer; border: none; }

    .btn-primary { padding: 14px 32px; background: var(--accent); color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 0.95rem; font-weight: 600; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-primary:disabled, .btn-danger:disabled, .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-danger { padding: 14px 32px; background: #dc2626; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 0.95rem; font-weight: 600; }
    .btn-danger:hover { background: #b91c1c; }

    .form-input { width: 100%; max-width: 380px; padding: 9px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 0.95rem; background: rgba(255,248,225,0.6); }
    .form-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 2px rgba(230,81,0,0.15); }
    .form-input[readonly] { background: var(--bg-subtle); color: var(--text-muted); cursor: default; }

    .alert { padding: 12px 16px; border-radius: 6px; font-size: 0.9rem; margin-bottom: 20px; }
    .alert-success { background: rgba(230,81,0,0.08); color: var(--accent); border: 1px solid rgba(230,81,0,0.25); }
    .alert-error { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
    .error { background: #fef2f2; border: 1px solid #fecaca; color: #dc2626; padding: 10px 14px; border-radius: 6px; margin-bottom: 16px; font-size: 0.95rem; }

    a { color: var(--accent); }

    /* --- Cloud layer --- */
    .cloud-layer {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
      opacity: 0.2;
    }
    .cloud-particle {
      position: absolute;
      user-select: none;
      pointer-events: none;
      will-change: transform;
      line-height: 1;
    }
    @keyframes cloud-drift {
      from { transform: translate3d(-20vw, 0, 0); }
      to { transform: translate3d(120vw, 0, 0); }
    }
    @media (prefers-reduced-motion: reduce) {
      .cloud-layer { display: none; }
    }
  </style>
  {% block extra_style %}{% endblock %}
</head>
<body>
  <!-- Background cloud layer -->
  <div class="cloud-layer" id="cloud-layer"></div>

  <div class="{% block body_class %}layout-narrow{% endblock %}">
    <nav>
      <a href="{% if is_authenticated %}/settings{% else %}/{% endif %}" class="brand">WeatherCal 🌤️</a>
      <div class="nav-right">{% block nav_right %}{% if is_authenticated %}<form method="post" action="/logout" style="margin:0"><button class="logout-btn" type="submit">Sign out</button></form>{% else %}<a href="/login" class="nav-link">Sign in</a>{% endif %}{% endblock %}</div>
    </nav>
    <div style="flex:1">{% block content %}{% endblock %}</div>
    {% block footer %}
    <footer style="margin-top:48px;padding-top:16px;border-top:1px solid var(--border);font-size:0.78rem;display:flex;justify-content:space-between">
      <a href="/impressum" style="color:var(--text-muted);text-decoration:none">Impressum</a>
      <a href="/terms" style="color:var(--text-muted);text-decoration:none">Terms</a>
      <a href="/privacy" style="color:var(--text-muted);text-decoration:none">Privacy</a>
      <a href="/feedback" style="color:var(--text-muted);text-decoration:none">Feedback</a>
    </footer>
    {% endblock %}
  </div>
  {% block extra_script %}{% endblock %}
  <script>
    document.querySelectorAll('.alert-success').forEach(function(el) {
      setTimeout(function() {
        el.style.transition = 'opacity 0.5s';
        el.style.opacity = '0';
        setTimeout(function() { el.remove(); }, 500);
      }, 8000);
    });
    document.querySelectorAll('form').forEach(function(form) {
      form.addEventListener('submit', function() {
        var btn = form.querySelector('button[type="submit"]');
        if (!btn || btn.disabled) return;
        var loadingText = btn.getAttribute('data-loading-text');
        if (!loadingText) return;
        btn.disabled = true;
        btn.textContent = loadingText;
      });
    });

    // Drifting clouds — simplified version of landing page
    (function() {
      if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
      var layer = document.getElementById('cloud-layer');
      if (!layer) return;
      var isMobile = window.innerWidth < 768;
      var defs = isMobile ? [
        { top: 8,  size: 10, duration: 55, delay: -5 },
        { top: 35, size: 7,  duration: 65, delay: -25 },
        { top: 60, size: 12, duration: 48, delay: -15 },
        { top: 85, size: 8,  duration: 58, delay: -35 }
      ] : [
        { top: 5,  size: 12, duration: 60, delay: -5 },
        { top: 22, size: 8,  duration: 72, delay: -20 },
        { top: 40, size: 15, duration: 50, delay: -35 },
        { top: 58, size: 9,  duration: 66, delay: -12 },
        { top: 78, size: 13, duration: 54, delay: -28 }
      ];
      var frag = document.createDocumentFragment();
      for (var i = 0; i < defs.length; i++) {
        var d = defs[i];
        var el = document.createElement('span');
        el.className = 'cloud-particle';
        el.style.cssText = 'top:' + d.top + '%;left:-20%;font-size:' + d.size + 'rem;'
          + 'animation:cloud-drift ' + d.duration + 's linear ' + d.delay + 's infinite;';
        el.textContent = '\u2601\uFE0F';
        frag.appendChild(el);
      }
      layer.appendChild(frag);
    })();
  </script>
</body>
</html>
