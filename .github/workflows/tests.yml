name: Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest src/tests/ -q --tb=short

  # Runs on the self-hosted runner on the Mac Mini server.
  # Only triggers on pushes to main (not PRs) after tests pass.
  # Gated behind DEPLOY_ENABLED variable so it can be toggled off.
  deploy:
    needs: test
    runs-on: self-hosted
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.DEPLOY_ENABLED == 'true'

    steps:
      - name: Deploy
        run: |
          cd ~/weather_cal
          bash deploy.sh
