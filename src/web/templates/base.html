<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☀️</text></svg>">
  <title>{% block title %}WeatherCal{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; color: #111; margin: 0; padding: 0; }

    .layout-narrow { max-width: 520px; margin: 0 auto; padding: 24px; }
    .layout-medium { max-width: 720px; margin: 0 auto; padding: 24px; }
    .layout-wide   { max-width: 960px; margin: 0 auto; padding: 24px; }

    nav { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; border-bottom: 1px solid #e5e7eb; margin-bottom: 32px; flex-wrap: wrap; gap: 8px; }
    .brand { font-size: 1.1rem; font-weight: 700; color: #111; text-decoration: none; }
    .brand:hover { color: #2563eb; }
    .nav-right { display: flex; align-items: center; gap: 12px; }
    .nav-link { color: #6b7280; text-decoration: none; font-size: 0.95rem; }
    .nav-link:hover { color: #111; }
    .logout-btn { background: none; border: none; color: #6b7280; cursor: pointer; font-size: 0.95rem; padding: 0; }
    .logout-btn:hover { color: #111; }
    .logout-btn:focus { outline: 2px solid #2563eb; outline-offset: 2px; }

    .btn { display: inline-flex; align-items: center; gap: 8px; padding: 13px 20px; border-radius: 8px; font-size: 1rem; font-weight: 600; text-decoration: none; cursor: pointer; border: none; }

    .btn-primary { padding: 10px 22px; background: #2563eb; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 0.95rem; }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-danger { padding: 10px 22px; background: #dc2626; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 0.95rem; }
    .btn-danger:hover { background: #b91c1c; }

    .form-input { width: 100%; max-width: 380px; padding: 9px 12px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 0.95rem; }
    .form-input:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 2px rgba(37,99,235,0.15); }
    .form-input[readonly] { background: #f9fafb; color: #6b7280; cursor: default; }

    .alert { padding: 12px 16px; border-radius: 6px; font-size: 0.9rem; margin-bottom: 20px; }
    .alert-success { background: #f0fdf4; color: #15803d; border: 1px solid #bbf7d0; }
    .alert-error { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
    .error { background: #fef2f2; border: 1px solid #fecaca; color: #dc2626; padding: 10px 14px; border-radius: 6px; margin-bottom: 16px; font-size: 0.95rem; }

    a { color: #2563eb; }
  </style>
  {% block extra_style %}{% endblock %}
</head>
<body>
  <div class="{% block body_class %}layout-narrow{% endblock %}">
    <nav>
      <a href="/" class="brand">WeatherCal ☀️</a>
      <div class="nav-right">{% block nav_right %}{% if is_authenticated %}<form method="post" action="/logout" style="margin:0"><button class="logout-btn" type="submit">Logout</button></form>{% else %}<a href="/login" class="nav-link">Sign in</a>{% endif %}{% endblock %}</div>
    </nav>
    {% block content %}{% endblock %}
    {% block footer %}
    <footer style="margin-top:48px;padding-top:16px;border-top:1px solid #f3f4f6;font-size:0.78rem;display:flex;justify-content:space-between">
      <a href="/impressum" style="color:#9ca3af;text-decoration:none">Impressum</a>
      <a href="/terms" style="color:#9ca3af;text-decoration:none">Terms</a>
      <a href="/privacy" style="color:#9ca3af;text-decoration:none">Privacy</a>
    </footer>
    {% endblock %}
  </div>
  {% block extra_script %}{% endblock %}
  <script>
    document.querySelectorAll('.alert-success').forEach(function(el) {
      setTimeout(function() {
        el.style.transition = 'opacity 0.5s';
        el.style.opacity = '0';
        setTimeout(function() { el.remove(); }, 500);
      }, 5000);
    });
  </script>
</body>
</html>
